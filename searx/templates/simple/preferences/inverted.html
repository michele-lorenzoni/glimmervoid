<fieldset>{{- '' -}}
  <legend id="pref_inverted">{{- _('Inverted colors') -}}</legend>{{- '' -}}
  <div class="value">{{- '' -}}
    <input type="checkbox" id="pref_inverted_check" aria-labelledby="pref_inverted" data-inverted-toggle>{{- '' -}}
  </div>{{- '' -}}
  <div class="description">
    {{- _('Inverte i colori della pagina (low-light / stampa). Persistente in localStorage, nessun reload.') -}}
  </div>{{- '' -}}
</fieldset>{{- '' -}}

<script>
    (function () {
        var cb = document.querySelector('[data-inverted-toggle]');
        if (!cb) return;
        var saved = localStorage.getItem('inverted') === 'yes';
        cb.checked = saved;
        if (saved) {
            document.documentElement.dataset.inverted = 'yes';
        } else {
            delete document.documentElement.dataset.inverted;
        }
        cb.addEventListener('change', function () {
            if (cb.checked) {
                document.documentElement.dataset.inverted = 'yes';
                localStorage.setItem('inverted', 'yes');
            } else {
                delete document.documentElement.dataset.inverted;
                localStorage.removeItem('inverted');
            }
        });
    })();
</script>
